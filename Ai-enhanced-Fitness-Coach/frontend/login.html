<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mood Chat Assistant</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>💪 Mood Chat Assistant</h1>
                <p>Track your mood, get personalized suggestions</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <h2>Welcome Back</h2>

                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required autocomplete="current-password">
                </div>

                <div class="error-message" id="loginError"></div>

                <button type="submit" class="btn-primary">Login</button>

                <p class="switch-form">
                    Don't have an account?
                    <a href="#" id="showRegister">Register here</a>
                </p>

                <div class="demo-credentials">
                    <p><strong>Demo Account:</strong></p>
                    <p>Username: <code>demo</code></p>
                    <p>Password: <code>demo123</code></p>
                </div>
            </form>

            <!-- Register Form (Hidden) -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <h2>Create Account</h2>

                <div class="form-group">
                    <label for="registerFullName">Full Name</label>
                    <input type="text" id="registerFullName" autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" required autocomplete="new-password" minlength="6">
                    <small>At least 6 characters</small>
                </div>

                <div class="error-message" id="registerError"></div>

                <button type="submit" class="btn-primary">Register</button>

                <p class="switch-form">
                    Already have an account?
                    <a href="#" id="showLogin">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="login.js?v=2025"></script>
</body>

</html>
