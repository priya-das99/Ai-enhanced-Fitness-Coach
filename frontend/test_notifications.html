<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Notifications</title>
    <link rel="stylesheet" href="system_notifications.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-container { max-width: 400px; margin: 0 auto; }
        .chat-messages { 
            height: 400px; 
            border: 1px solid #ccc; 
            overflow-y: auto; 
            padding: 10px; 
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        button { 
            margin: 5px; 
            padding: 10px 15px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Notification System Test</h1>
        
        <div class="chat-messages" id="chatMessages">
            <p>Test area for notifications...</p>
        </div>
        
        <button onclick="testWaterNotification()">Test Water Notification</button>
        <button onclick="testChallengeNotification()">Test Challenge Notification</button>
        <button onclick="clearMessages()">Clear Messages</button>
        
        <h3>Test Results:</h3>
        <div id="testResults"></div>
    </div>

    <script src="system_notifications.js"></script>
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const testResults = document.getElementById('testResults');
        
        function testWaterNotification() {
            const notification = {
                id: Date.now(),
                title: '💧 Hydration Check!',
                message: "💡 💧 Hydration Check!\n\nIt's been a while since your last water intake. Remember to stay hydrated! Your body needs water to function at its best.",
                timestamp: new Date().toISOString(),
                action_buttons: [
                    { id: 'log_water', label: '💧 Log Water' },
                    { id: 'snooze_reminder', label: '⏰ Remind Later' }
                ]
            };
            
            if (typeof displaySystemNotification === 'function') {
                displaySystemNotification(notification);
                testResults.innerHTML += '<p>✅ Water notification displayed successfully</p>';
            } else {
                testResults.innerHTML += '<p>❌ displaySystemNotification function not found</p>';
            }
        }
        
        function testChallengeNotification() {
            const notification = {
                id: Date.now() + 1,
                title: '🎯 Challenge Check-in',
                message: "💡 🔥 Challenge Check-in\n\nHow's your Water Intake Challenge going? You're doing great! Keep up the momentum and stay hydrated throughout the day.",
                timestamp: new Date().toISOString(),
                action_buttons: [
                    { id: 'view_progress', label: '📊 View Progress' },
                    { id: 'log_activity', label: '✅ Log Activity' }
                ]
            };
            
            if (typeof displaySystemNotification === 'function') {
                displaySystemNotification(notification);
                testResults.innerHTML += '<p>✅ Challenge notification displayed successfully</p>';
            } else {
                testResults.innerHTML += '<p>❌ displaySystemNotification function not found</p>';
            }
        }
        
        function clearMessages() {
            chatMessages.innerHTML = '<p>Test area for notifications...</p>';
            testResults.innerHTML = '';
        }
        
        // Test if functions are available
        window.onload = function() {
            testResults.innerHTML = '<h4>Function Availability:</h4>';
            testResults.innerHTML += `<p>displaySystemNotification: ${typeof displaySystemNotification}</p>`;
            testResults.innerHTML += `<p>extractNotificationTitle: ${typeof extractNotificationTitle}</p>`;
            testResults.innerHTML += `<p>generateActionButtons: ${typeof generateActionButtons}</p>`;
            testResults.innerHTML += `<p>forceNotificationCheck: ${typeof forceNotificationCheck}</p>`;
        };
    </script>
</body>
</html>
