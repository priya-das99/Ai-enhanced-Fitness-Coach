services:
  - type: web
    name: moodcapture-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && chmod +x start.sh && ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: moodcapture-db
          property: connectionString
    
  - type: pserv
    name: moodcapture-db
    env: postgresql
    plan: free
    databaseName: moodcapture
    user: moodcapture_user